// 3. GEMINI API SERVICE
const beautifyPrompt = async (prompt, apiKey) => {
  if (!apiKey) {
    throw new Error("未配置API Key");
  }
  const ai = new GoogleGenAI({ apiKey });
  try {
    const fullPrompt = `Enhance and beautify this image generation prompt, making it more vivid, detailed, and artistic. Make it suitable for an AI image generator. Only return the improved prompt as a single line of plain text. Do not include any conversational text, labels, quotation marks, or markdown formatting.
Original prompt: "${prompt}"`;
    
    const response = await ai.models.generateContent({
        model: 'gemini-2.5-flash-preview-04-17',
        contents: fullPrompt,
        config: { thinkingConfig: { thinkingBudget: 0 } }
    });
    
    return response.text.trim();
  } catch (error) {
    console.error("Error beautifying prompt:", error);
    throw new Error("美化提示詞失敗，請檢查API Key或稍後重試。");
  }
};

const getRandomPrompt = async (apiKey) => {
  if (!apiKey) {
    throw new Error("未配置API Key");
  }
  const ai = new GoogleGenAI({ apiKey });
  try {
    const prompt = `Generate a single, random, creative, and visually inspiring image generation prompt. The prompt should be concise yet imaginative. Return only the prompt text itself as a single line of plain text. Do not add any conversational text, labels, quotation marks, or markdown formatting. For example: "a crystal dragon sleeping on a bed of glowing mushrooms".`;

    const response = await ai.models.generateContent({
        model: 'gemini-2.5-flash-preview-04-17',
        contents: prompt,
        config: { thinkingConfig: { thinkingBudget: 0 } }
    });

    return response.text.trim();
  } catch (error) {
    console.error("Error getting random prompt:", error);
    throw new Error("獲取隨機靈感失敗，請檢查API Key或稍後重試。");
  }
};

const Notification = ({ notification, onDismiss }) => {
  const [exiting, setExiting] = useState(false);
  const NOTIFICATION_TIMEOUT = 5000;

  useEffect(() => {
    const timer = setTimeout(() => {
      setExiting(true);
      setTimeout(() => onDismiss(notification.id), 300);
    }, NOTIFICATION_TIMEOUT);
    return () => clearTimeout(timer);
  }, [notification.id, onDismiss]);

  const handleDismiss = () => {
    setExiting(true);
    setTimeout(() => onDismiss(notification.id), 300);
  };

  const isSuccess = notification.type === 'success';
  const baseClasses = 'flex items-center w-full max-w-xs p-4 space-x-4 text-gray-100 bg-slate-800/80 backdrop-blur-md rounded-lg shadow-lg ring-1 ring-white/10 transition-all duration-300';
  const positionClasses = exiting ? 'opacity-0 translate-y-4' : 'opacity-100 translate-y-0';
  const gradientBorder = isSuccess ? 'bg-gradient-to-r from-green-400 to-cyan-400' : 'bg-gradient-to-r from-red-500 to-orange-500';

  return (
    <div className={`${baseClasses} ${positionClasses}`} role="alert">
      <div className={`inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-lg ${gradientBorder}`}>
        {isSuccess ? <CheckCircleIcon className="w-5 h-5" /> : <ExclamationCircleIcon className="w-5 h-5" />}
      </div>
      <div className="text-sm font-normal">{notification.message}</div>
      <button type="button" className="ml-auto -mx-1.5 -my-1.5 rounded-lg p-1.5 inline-flex h-8 w-8 text-gray-400 hover:text-white hover:bg-gray-700 focus:ring-2 focus:ring-gray-300" onClick={handleDismiss} aria-label="Close">
        <span className="sr-only">Close</span>
        <svg className="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
          <path stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6" />
        </svg>
      </button>
    </div>
  );
};

// 6. MAIN APP COMPONENT
const App = () => {
  const [prompt, setPrompt] = useState('');
  const [selectedStyle, setSelectedStyle] = useState(ART_STYLES[0].promptSuffix);
  const [dimension, setDimension] = useState(DIMENSIONS[2]);
  const [batchCount, setBatchCount] = useState(1);
  const [isLoading, setIsLoading] = useState(false);
  const [isHelperLoading, setIsHelperLoading] = useState(null);
  const [generatedImages, setGeneratedImages] = useState([]);
  const [history, setHistory] = useState([]);
  const [notifications, setNotifications] = useState([]);
  const [previewImage, setPreviewImage] = useState(null);
  
  const [apiKey, setApiKey] = useState('');
  const [apiKeyInput, setApiKeyInput] = useState('');
  const [showApiSettings, setShowApiSettings] = useState(false);

  useEffect(() => {
    try {
      const storedHistory = localStorage.getItem('imageGenHistory');
      if (storedHistory) setHistory(JSON.parse(storedHistory));
      
      const storedApiKey = localStorage.getItem('geminiApiKey');
      if (storedApiKey) {
        setApiKey(storedApiKey);
        setApiKeyInput(storedApiKey);
      } else {
        setShowApiSettings(true); // Auto-open settings if no key
      }
    } catch (error) {
      console.error("Failed to load from localStorage", error);
      addNotification('無法加載本地設定', 'error');
    }
  }, []);
  
  const addNotification = (message, type) => {
    setNotifications(prev => [...prev, { id: Date.now(), message, type }]);
  };

  const removeNotification = id => {
    setNotifications(prev => prev.filter(n => n.id !== id));
  };
  
  const handleSaveApiKey = () => {
    if(!apiKeyInput.trim()){
      addNotification('API Key不能為空', 'error');
      return;
    }
    setApiKey(apiKeyInput);
    localStorage.setItem('geminiApiKey', apiKeyInput);
    addNotification('API Key 已成功保存', 'success');
    setShowApiSettings(false);
  };

  const handleDownload = useCallback((image) => {
    addNotification('圖像下載請求已發送...', 'success');
    fetch(image.url)
      .then(response => {
        if (!response.ok) throw new Error(`Network response was not ok, status: ${response.status}`);
        return response.blob();
      })
      .then(blob => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.style.display = 'none';
        a.href = url;
        const safePrompt = image.prompt.replace(/[^a-z0-9]/gi, '_').slice(0, 30);
        a.download = `pollinations_${safePrompt}.png`;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        a.remove();
        addNotification('圖像已開始下載', 'success');
      })
      .catch(err => {
        console.error("Download failed:", err);
        addNotification('下載失敗，圖片伺服器可能無回應', 'error');
      });
  }, []);
  
  const generateImages = async () => {
    if (!prompt.trim()) {
      addNotification('請輸入提示詞', 'error');
      return;
    }
    setIsLoading(true);
    setGeneratedImages([]);
    const newImages = [];
    const currentTimestamp = new Date().toISOString();

    for (let i = 0; i < batchCount; i++) {
        const seed = Math.floor(Math.random() * 100000);
        const fullPrompt = encodeURIComponent(`${prompt}${selectedStyle}`);
        const imageUrl = `https://image.pollinations.ai/prompt/${fullPrompt}?width=${dimension.width}&height=${dimension.height}&seed=${seed}&model=flux&nologo=true`;
        const newImage = {
            id: `${currentTimestamp}-${i}`,
            prompt: prompt,
            style: ART_STYLES.find(s => s.promptSuffix === selectedStyle)?.name || '自訂風格',
            url: imageUrl,
            width: dimension.width,
            height: dimension.height,
            timestamp: currentTimestamp,
        };
        newImages.push(newImage);
    }
    
    setGeneratedImages(newImages);
    setHistory(prev => {
        const updatedHistory = [...newImages, ...prev].slice(0, 50);
        try {
            localStorage.setItem('imageGenHistory', JSON.stringify(updatedHistory));
        } catch(error) {
            console.error("Failed to save history to localStorage", error);
            addNotification('無法保存歷史紀錄到本地儲存', 'error');
        }
        return updatedHistory;
    });

    setIsLoading(false);
    addNotification(`已成功生成 ${batchCount} 張圖像`, 'success');
  };
  
  const handleBeautify = async () => {
    if (!prompt.trim()) {
      addNotification('請先輸入提示詞再進行美化', 'error');
      return;
    }
    setIsHelperLoading('beautify');
    try {
      const beautifulPrompt = await beautifyPrompt(prompt, apiKey);
      setPrompt(beautifulPrompt);
      addNotification('提示詞已美化', 'success');
    } catch (e) {
      addNotification(e.message || '美化失敗', 'error');
    } finally {
      setIsHelperLoading(null);
    }
  };

  const handleRandom = async () => {
    setIsHelperLoading('random');
    try {
      const randomPrompt = await getRandomPrompt(apiKey);
      setPrompt(randomPrompt);
      addNotification('已生成隨機靈感', 'success');
    } catch (e) {
      addNotification(e.message || '獲取靈感失敗', 'error');
    } finally {
      setIsHelperLoading(null);
    }
  };
  
  const handleClear = () => {
    setPrompt('');
    addNotification('提示詞已清空', 'success');
  };

  const isApiKeyMissing = !apiKey;

  return (
    <>
      <NotificationContainer notifications={notifications} onDismiss={removeNotification} />
      
      {previewImage && (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4" onClick={() => setPreviewImage(null)}>
          <div className="relative max-w-4xl max-h-[90vh]" onClick={e => e.stopPropagation()}>
            <img src={previewImage.url} alt={previewImage.prompt} className="object-contain w-full h-full rounded-lg shadow-2xl"/>
            <button onClick={() => setPreviewImage(null)} className="absolute -top-3 -right-3 bg-white text-black rounded-full h-8 w-8 flex items-center justify-center text-2xl font-bold leading-none hover:bg-gray-200 transition" aria-label="關閉預覽">&times;</button>
          </div>
        </div>
      )}

      <div className="min-h-screen text-white p-4 sm:p-6 lg:p-8 font-sans">
        <main className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
          {/* Left Panel: Controls */}
          <div className="lg:col-span-1 space-y-6">
            <header className="p-4 rounded-xl bg-gradient-to-br from-purple-600/50 to-blue-500/50">
              <h1 className="text-3xl font-bold text-center text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-pink-300">AI 圖像生成器 Pro</h1>
              <p className="text-center text-purple-200 mt-1">輸入您的創意，見證魔法</p>
            </header>
            
            <div className="p-6 bg-slate-800/50 backdrop-blur-md rounded-xl ring-1 ring-white/10 space-y-4">
               {/* API Key Settings */}
               <div>
                  <button onClick={() => setShowApiSettings(!showApiSettings)} className="flex justify-between items-center w-full text-left">
                      <div className="flex items-center gap-2">
                          <KeyIcon className="w-5 h-5 text-purple-300"/>
                          <span className="font-medium text-purple-300">API Key 設定</span>
                          {isApiKeyMissing && <span className="text-xs text-red-400">(必要)</span>}
                      </div>
                      <ChevronDownIcon className={`w-5 h-5 text-purple-300 transition-transform ${showApiSettings ? 'rotate-180' : ''}`} />
                  </button>
                  {showApiSettings && (
                      <div className="mt-4 space-y-3">
                          <p className="text-xs text-slate-400">
                            提示詞輔助功能 (隨機/美化) 需要 Google Gemini API Key。您可以從 <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener noreferrer" className="text-cyan-400 underline hover:text-cyan-300">Google AI Studio</a> 免費獲取。
                          </p>
                          <input
                              type="password"
                              value={apiKeyInput}
                              onChange={e => setApiKeyInput(e.target.value)}
                              placeholder="請在此貼上您的 API Key"
                              className="w-full bg-slate-900/70 border border-slate-700 rounded-lg p-2 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 transition"
                          />
                          <button onClick={handleSaveApiKey} className="w-full px-4 py-2 text-sm font-semibold rounded-md bg-gradient-to-r from-purple-500 to-indigo-500 hover:from-purple-600 hover:to-indigo-600 transition-transform hover:scale-105">
                              保存 Key
                          </button>
                      </div>
                  )}
              </div>

               <hr className="border-slate-700" />
            
              {/* Prompt Input */}
              <div>
                <label htmlFor="prompt" className="block text-sm font-medium text-purple-300 mb-2">1. 輸入提示詞</label>
                <div className="relative">
                  <textarea id="prompt" rows={4} value={prompt} onChange={e => setPrompt(e.target.value)} placeholder="例如：一隻戴著太陽眼鏡的貓在月球上開跑車" className="w-full bg-slate-900/70 border border-slate-700 rounded-lg p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 transition" />
                   <div className="flex justify-end space-x-2 mt-2">
                      <button onClick={handleRandom} disabled={isHelperLoading || isApiKeyMissing} title={isApiKeyMissing ? "請先設定 API Key" : "隨機靈感"} className="flex items-center justify-center gap-1.5 px-3 py-1.5 text-xs rounded-md bg-gradient-to-r from-green-500 to-teal-500 hover:from-green-600 hover:to-teal-600 disabled:opacity-50 disabled:cursor-not-allowed transition-transform hover:scale-105">
                        {isHelperLoading === 'random' ? <div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <ShuffleIcon className="w-4 h-4"/>} <span>隨機</span>
                      </button>
                      <button onClick={handleClear} disabled={!!isHelperLoading} className="flex items-center justify-center gap-1.5 px-3 py-1.5 text-xs rounded-md bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600 disabled:opacity-50 transition-transform hover:scale-105">
                         <TrashIcon className="w-4 h-4"/> <span>清空</span>
                      </button>
                      <button onClick={handleBeautify} disabled={isHelperLoading || isApiKeyMissing} title={isApiKeyMissing ? "請先設定 API Key" : "美化描述"} className="flex items-center justify-center gap-1.5 px-3 py-1.5 text-xs rounded-md bg-gradient-to-r from-pink-500 to-purple-500 hover:from-pink-600 hover:to-purple-600 disabled:opacity-50 disabled:cursor-not-allowed transition-transform hover:scale-105">
                        {isHelperLoading === 'beautify' ? <div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <SparklesIcon className="w-4 h-4"/>} <span>美化</span>
                      </button>
                  </div>
                </div>
              </div>
              
              {/* Style Selection */}
              <div>
                <label htmlFor="style" className="block text-sm font-medium text-purple-300 mb-2">2. 選擇藝術風格</label>
                <div className="relative">
                    <select id="style" value={selectedStyle} onChange={e => setSelectedStyle(e.target.value)} className="w-full bg-slate-900/70 border border-slate-700 rounded-lg p-3 focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 transition appearance-none">
                    {ART_STYLES.map(style => <option key={style.name} value={style.promptSuffix}>{style.icon} {style.name}</option>)}
                    </select>
                    <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-400">
                        <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                    </div>
                </div>
              </div>

              {/* Dimension & Batch */}
              <div className="grid grid-cols-2 gap-6">
                <div>
                  <label className="block text-sm font-medium text-purple-300 mb-2">3. 圖片尺寸</label>
                  <div className="grid grid-cols-2 gap-2">
                    {DIMENSIONS.map(d => (
                      <button key={d.name} onClick={() => setDimension(d)} className={`flex items-center justify-center p-2 rounded-lg transition-all border-2 ${dimension.name === d.name ? 'border-cyan-400 bg-cyan-400/20 shadow-lg shadow-cyan-500/20' : 'border-slate-700 bg-slate-900/70 hover:border-slate-500 hover:bg-slate-700/50'}`} title={d.name}>
                        {d.icon}
                      </button>
                    ))}
                  </div>
                </div>
                 <div>
                  <label htmlFor="batchCount" className="block text-sm font-medium text-purple-300 mb-2">4. 生成數量</label>
                  <input type="number" id="batchCount" value={batchCount} min="1" max="10" onChange={e => setBatchCount(Math.max(1, Math.min(10, parseInt(e.target.value) || 1)))} className="w-full bg-slate-900/70 border border-slate-700 rounded-lg p-2.5 text-center focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400 transition" />
                </div>
              </div>

              {/* Generate Button */}
              <button onClick={generateImages} disabled={isLoading} className="w-full text-lg font-bold py-3 px-4 rounded-lg bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-400 hover:to-blue-400 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-300 transform hover:scale-105 shadow-[0_0_20px_rgba(56,189,248,0.3)] flex items-center justify-center gap-2">
                {isLoading ? <div className="w-6 h-6 border-4 border-white border-t-transparent rounded-full animate-spin"></div> : '🚀'}
                {isLoading ? '生成中...' : '開始生成'}
              </button>
            </div>

            {/* History Panel */}
            <div className="p-6 bg-slate-800/50 backdrop-blur-md rounded-xl ring-1 ring-white/10">
              <h2 className="text-xl font-bold text-purple-300 mb-4">歷史紀錄</h2>
              <div className="max-h-96 space-y-3 overflow-y-auto pr-2">
                {history.length > 0 ? history.map(img => <HistoryItem key={img.id} image={img} onDownload={handleDownload} onPreview={setPreviewImage} />) : <p className="text-center text-slate-400 py-8">還沒有歷史紀錄</p>}
              </div>
            </div>
          </div>
          
          {/* Right Panel: Image Display */}
          <div className="lg:col-span-2 min-h-[60vh] lg:min-h-0 bg-slate-900/30 backdrop-blur-sm rounded-xl p-6 ring-1 ring-white/10 flex items-center justify-center">
            {isLoading ? <Spinner /> : generatedImages.length > 0 ? (
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 w-full h-full overflow-y-auto pr-2">
                {generatedImages.map(img => <ImageCard key={img.id} image={img} onDownload={handleDownload} />)}
              </div>
            ) : (
              <div className="text-center text-slate-400">
                <p className="text-4xl mb-4">🎨</p>
                <h3 className="text-xl font-semibold">準備好創造藝術了嗎？</h3>
                <p>生成的圖像將會顯示在這裡</p>
              </div>
            )}
          </div>
        </main>
      </div>
    </>
  );
};


// 7. REACT DOM RENDER CALL
const rootElement = document.getElementById('root');
if (!rootElement) throw new Error("Could not find root element to mount to");
const root = ReactDOM.createRoot(rootElement);
root.render(
  <StrictMode>
    <App />
  </StrictMode>
);

    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
